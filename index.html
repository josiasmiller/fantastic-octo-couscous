<!DOCTYPE html>
<html>

<head>
    <title>App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            
        }

        input {
            background-color: #d3d3d3;
            border: 2px solid #000000;
            font-size: 16px;
            margin-top: 20px;
        }

        button {
            background-color: #104d18;
            border: 2px solid #000000;
            font-size: 16px;

        }
        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .background {
            background-color: #000000;
            width: 100%;
            height: 100vh;
        
        }

        .contentCard {
            background-color: #6c6d6c;
            width: 75%;
            min-height: 100vh;            
            margin: 0 auto;

            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="background">
    <div class="contentCard">
        <h1>App that does something. </h1>
        <p>Wouldn't be public yet but it has to be to host for free on github pages. This will support content filtering later on.</p>
        <div class="form">
            <input class="input" type="text" id="urlInput" placeholder="Enter Youtube URL...">
            <br>
            <button id="submitButton" onclick="loadVideo()">Enter</button>
        </div>
        <div class="wrapper">
            <iframe id="iframe" width="560" height="315" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
</div>

    <script>
        const urlInput = document.getElementById('urlInput');        
        const iframe = document.getElementById('iframe');

        function loadVideo() {
            const url = urlInput.value;
            const videoId = extractId(url);
            console.log(videoId);

            iframe.src = `https://www.youtube.com/embed/${videoId}`;
        }

        function extractId(url) {
            const cleanId = url.split('v=')[1];
            return cleanId;

        }
    </script>
</body>

</html>
