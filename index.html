<!DOCTYPE html>
<html>

<head>
    <title>App</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        h1 {
            color: #ffffff;
            padding-bottom: 0px;
            font-size: 35px;
            padding-top: 0px;
            margin: 0px;
        }

        button {
            background-color: #000000;
            border: 2px solid #ffffff;
            font-size: 16px;
            height: 40px;
            width: 100px;
            color: #ffffff;
        }

        button:hover {
            background-color: #ffffff;
            color: #000000;
        }

        input {
            background-color: #ffffff;
            border: 2px solid #ffffff;
            font-size: 16px;
            height: 40px;
            width: 300px;
        }

        .form {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding-bottom: 5px;
            padding-top: 5px;
            gap: 10px;
        }

        .background {
            background-color: #000000;
            width: 100%;
            height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .contentCard {
            background-color: #000000;
            width: 85%;
            height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 10px;
            border: 2px solid #ffffff;
            overflow: hidden;

        }

        .wrapper {
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <div class="background">
        <h1>App</h1>
        <div class="form">
            <input class="input" type="text" id="urlInput" placeholder="Enter Youtube URL...">
            <button id="submitButton" onclick="loadVideo()">Load Media</button>
        </div>
        <div class="contentCard">
            <div class="wrapper">
                <iframe id="iframe" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const iframe = document.getElementById('iframe');
        const status = document.getElementById('status');

        function loadVideo() {
            const url = urlInput.value;
            const videoId = extractId(url);
            console.log(videoId);

            if (!videoId) {
                alert('Invalid YouTube URL');
                return;
            }

            iframe.src = `https://www.youtube.com/embed/${videoId}`;            
        }

        function extractId(url) {
            try {
                let cleanId;

                if (url.includes('youtube.com/watch')) {
                    cleanId = url.split('v=')[1];
                }
                else if (url.includes('youtu.be/')) {
                    cleanId = url.split('youtu.be/')[1];
                }
                else if (url.includes('youtube.com/shorts/')) {
                    cleanId = url.split('shorts/')[1];
                }
                else if (url.includes('youtube.com/embed/')) {
                    cleanId = url.split('embed/')[1];
                }
                else {
                    return null;
                }

                return cleanId;

            } catch (error) {
                return null;
            }

        }
    </script>
</body>

</html>
