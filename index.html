<!DOCTYPE html>
<html>

<head>
    <title>App</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        h1,
        p {
            color: #ffffff;
        }
        button:hover {
            background-color: #1a5d9c;
        }

        input {
            background-color: #d3d3d3;
            border: 2px solid #000000;
            font-size: 16px;
            margin-top: 20px;
        }
        input:hover {
            background-color: #ffffff;
        }

        button {
            background-color: #ff0000;
            border: 2px solid #000000;
            font-size: 16px;
            height: 40px;
            width: 100px;
            color: #ffffff;

        }

        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .background {
            background-color: #6e6e6e;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contentCard {
            background-color: #3b3b3b;
            width: 85%;
            height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="background">
        <div class="contentCard">
            <h1>App that does something. </h1>
            <div id="status">
                <p>Wouldn't be public yet but it has to be to host for free on github pages. This will support
                    content filtering later on.</p>
            </div>
            <div class="form">
                <input class="input" type="text" id="urlInput" placeholder="Enter Youtube URL...">
                <br>
                <button id="submitButton" onclick="loadVideo()">Load Media</button>
            </div>
            <div class="wrapper">
                <iframe id="iframe" width="560" height="315" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const iframe = document.getElementById('iframe');
        const status = document.getElementById('status');

        function loadVideo() {
            const url = urlInput.value;
            const videoId = extractId(url);

            if (!videoId) {
                status.textContent = 'Invalid YouTube URL. Please try again.';
                status.style.color = 'red';
                return;
            }



            iframe.src = `https://www.youtube.com/embed/${videoId}`;
            status.textContent = 'Video loaded successfully!';
        }

        function extractId(url) {
            const cleanId = url.split('v=')[1];
            return cleanId;

        }
    </script>
</body>

</html>
